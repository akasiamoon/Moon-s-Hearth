<!DOCTYPE html>
<html lang="en">
<head>
   <link rel="icon" href="icon_512.jpg" type="image/jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon's Hearth Sanctuary</title>
    <link rel="stylesheet" href="style.css?v=8">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
   <body>
    <div class="sanctuary-container">
        <div id="sanctuary-stage" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1;">
            <img src="sanctuary.jpg" class="master-image" id="bg-art" alt="Sanctuary" style="z-index: 1;">
            
            <div id="furnishing-layer" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10; pointer-events: none;"></div>
            
            <div class="dust-container" style="z-index: 15;"></div>
        </div>

        <div id="interaction-layer" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 20;">
            <div id="portal-window" class="portal" onclick="openPortal('window')"></div>
            <div id="portal-herbs" class="portal" onclick="openPortal('herbs')"></div>
            <div id="portal-audio" class="portal" onclick="openPortal('audio')"></div>
            <div id="portal-grimoire" class="portal" onclick="openPortal('grimoire')"></div>
            <div id="portal-alchemy" class="portal" onclick="openPortal('alchemy')"></div>
            <div id="portal-teacup" class="portal" onclick="openPortal('teacup')"></div>
            <div id="portal-cat" class="portal" onclick="openPortal('cat')"></div>
            <div id="portal-sewing" class="portal" onclick="openPortal('sewing')"></div>
            <div id="portal-ledger" class="portal" onclick="openPortal('ledger')"></div>
            <div id="portal-workshop" class="portal" onclick="openPortal('workshop')"></div>
            <div id="portal-apprentice" class="portal" onclick="openPortal('apprentice')"></div>
            <div id="portal-inventory" class="portal" onclick="openPortal('inventory')"></div>
            <div id="portal-garden" class="portal" onclick="openPortal('garden')"></div>
        </div>
    </div>

    <div id="parchment-overlay">
        <span class="close-btn" onclick="closePortal()">&times;</span>
        <div id="portal-content"></div>
        
        <div id="soundscape-container" style="display: none;">
            <div class="sound-item"><audio id="audio-rain" src="rain.mp3" loop></audio><button class="play-btn" data-target="audio-rain">🌧️ Rain</button><input type="range" class="volume-slider" data-target="audio-rain" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-thunder" src="thunder.mp3" loop></audio><button class="play-btn" data-target="audio-thunder">🌩️ Thunder</button><input type="range" class="volume-slider" data-target="audio-thunder" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-winterwind" src="winterwind.mp3" loop></audio><button class="play-btn" data-target="audio-winterwind">🌬️ Winter Wind</button><input type="range" class="volume-slider" data-target="audio-winterwind" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-owls" src="owls.mp3" loop></audio><button class="play-btn" data-target="audio-owls">🦉 Owls</button><input type="range" class="volume-slider" data-target="audio-owls" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-raven" src="raven.mp3" loop></audio><button class="play-btn" data-target="audio-raven">🐦‍⬛ Raven</button><input type="range" class="volume-slider" data-target="audio-raven" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-frogs" src="frogs.mp3" loop></audio><button class="play-btn" data-target="audio-frogs">🐸 Night Frogs</button><input type="range" class="volume-slider" data-target="audio-frogs" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-crickets" src="crickets.mp3" loop></audio><button class="play-btn" data-target="audio-crickets">🦗 Crickets</button><input type="range" class="volume-slider" data-target="audio-crickets" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-fire" src="fire.mp3" loop></audio><button class="play-btn" data-target="audio-fire">🔥 Fire</button><input type="range" class="volume-slider" data-target="audio-fire" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-simmeringpot" src="simmeringpot.mp3" loop></audio><button class="play-btn" data-target="audio-simmeringpot">🍲 Simmering Pot</button><input type="range" class="volume-slider" data-target="audio-simmeringpot" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-teacup" src="teacup.mp3" loop></audio><button class="play-btn" data-target="audio-teacup">☕ Teacup</button><input type="range" class="volume-slider" data-target="audio-teacup" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-clock" src="clock.mp3" loop></audio><button class="play-btn" data-target="audio-clock">🕰️ Ticking Clock</button><input type="range" class="volume-slider" data-target="audio-clock" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-cat" src="cat.mp3" loop></audio><button class="play-btn" data-target="audio-cat">🐾 Cat Purring</button><input type="range" class="volume-slider" data-target="audio-cat" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-windchimes" src="windchimes.mp3" loop></audio><button class="play-btn" data-target="audio-windchimes">🎐 Windchimes</button><input type="range" class="volume-slider" data-target="audio-windchimes" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-musicbox1" src="musicbox1.mp3" loop></audio><button class="play-btn" data-target="audio-musicbox1">🎶 Music Box 1</button><input type="range" class="volume-slider" data-target="audio-musicbox1" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-musicbox2" src="musicbox2.mp3" loop></audio><button class="play-btn" data-target="audio-musicbox2">🎶 Music Box 2</button><input type="range" class="volume-slider" data-target="audio-musicbox2" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-musicbox3" src="musicbox3.mp3" loop></audio><button class="play-btn" data-target="audio-musicbox3">🎶 Music Box 3</button><input type="range" class="volume-slider" data-target="audio-musicbox3" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-xmasmusicbox1" src="xmasmusicbox1.mp3" loop></audio><button class="play-btn" data-target="audio-xmasmusicbox1">🎄 Xmas Box 1</button><input type="range" class="volume-slider" data-target="audio-xmasmusicbox1" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-xmasmusicbox2" src="xmasmusicbox2.mp3" loop></audio><button class="play-btn" data-target="audio-xmasmusicbox2">🎄 Xmas Box 2</button><input type="range" class="volume-slider" data-target="audio-xmasmusicbox2" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-xmasmusicbox3" src="xmasmusicbox3.mp3" loop></audio><button class="play-btn" data-target="audio-xmasmusicbox3">🎄 Xmas Box 3</button><input type="range" class="volume-slider" data-target="audio-xmasmusicbox3" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-darkmusic1" src="darkmusic1.mp3" loop></audio><button class="play-btn" data-target="audio-darkmusic1">🖤 Dark Music 1</button><input type="range" class="volume-slider" data-target="audio-darkmusic1" min="0" max="1" step="0.01" value="0.5"></div>
            <div class="sound-item"><audio id="audio-binarymusicbox" src="binarymusicbox.mp3" loop></audio><button class="play-btn" data-target="audio-binarymusicbox">🎵 Binary Box</button><input type="range" class="volume-slider" data-target="audio-binarymusicbox" min="0" max="1" step="0.01" value="0.5"></div>
        </div> 
    </div> 

    <div id="architect-toolbox" style="display:none; position:fixed; left:20px; top:50%; transform:translateY(-50%); width:260px; background:rgba(10,10,12,0.98); border:2px solid #bf953f; border-radius:8px; padding:20px; z-index:10005; box-shadow:0 0 30px rgba(0,0,0,0.9);">
        <h3 class="gold-text" style="font-size: 1.1em; margin-top: 0;">Architect's Forge</h3>
        
        <input type="text" id="trophy-name" placeholder="Name this Sanctuary..." class="portal-input" style="margin-bottom:15px; text-align: center;">
        <div style="border-bottom:1px dashed rgba(191,149,63,0.5); margin-bottom:10px; padding-bottom:5px; color:#bf953f; font-size:0.8em; text-align:center;">Click an item to spawn it</div>
        
        <div id="toolbox-stash" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; max-height: 200px; overflow-y: auto; padding-right: 5px;">
            </div>
        
        <button onclick="sealTrophy()" class="portal-btn" style="width:100%; border-color:#8fce00; color:#8fce00; margin-bottom:10px;">Seal & Save Trophy</button>
        <button onclick="cancelForging()" class="portal-btn" style="width:100%; border-color:#ff6b6b; color:#ff6b6b;">Abandon Forge</button>
        
        <div id="item-controls" style="display:none; margin-top:15px; padding-top:15px; border-top:1px solid #bf953f;">
            <div style="color:#d4c8a8; font-size:0.8em; margin-bottom:5px; text-align:center;">Scale Selected Item</div>
            <input type="range" id="forge-scale" min="0.1" max="3" step="0.1" value="1" style="width:100%; margin-bottom:10px; accent-color:#bf953f;">
            <button onclick="deleteSelected()" class="portal-btn" style="width:100%; font-size:0.7em; padding:5px; border-color:#ff6b6b; color:#ff6b6b;">Remove Selected</button>
        </div>
    </div>

    <div id="familiar-container" onclick="claimFamiliarLoot()">
        <svg class="xp-ring" viewBox="0 0 100 100">
            <circle class="xp-ring-bg" cx="50" cy="50" r="46"></circle>
            <circle class="xp-ring-fill" id="xp-circle" cx="50" cy="50" r="46"></circle>
        </svg>
        <div class="familiar-glass">
            <img id="familiar-avatar" class="state-sleeping" src="cat_sleep.jpg" alt="Alinor Familiar">
        </div>
        <div id="familiar-speech" class="hidden"></div>
    </div>

    <script src="script.js?v=8"></script>
</body>
</html>
